name: CI Pipeline

on:
  push:
    branches: [ "main", "master", "feature/**", "fix/**" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Job 1: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --ignore-scripts
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 2: Linting ───────────────────────────────────────────────────────
  lint:
    name: Code Style (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --ignore-scripts
      - run: npm run lint

  # ── Job 3: Code Quality ──────────────────────────────────────────────────
  security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ajinabraham/njsscan-action@master
        with:
          args: 'src/ --sarif --output results.sarif || true'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --ignore-scripts
      - run: npm audit --audit-level=high || true
      - run: npx jscpd src/ --min-lines 5 --min-tokens 50 --reporters console || true

  # ── Job 4: Selenium E2E Tests ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Selenium IDE)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install app dependencies
        run: npm install --ignore-scripts

      - name: Install Selenium IDE runner
        run: npm install -g selenium-side-runner

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start blog app in background
        run: |
          nohup node src/app.js &
          sleep 3
          curl -f http://localhost:3000 || exit 1
        env:
          PORT: 3000
          SESSION_SECRET: ci-test-secret-key
          NODE_ENV: test

      - name: Run Selenium IDE tests
        run: |
          selenium-side-runner \
            --base-url http://localhost:3000 \
            --browser chrome \
            --output-directory selenium-results \
            selenium-tests/blog-app.side
        continue-on-error: true

      - name: Upload Selenium test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-results
          path: selenium-results/
          retention-days: 7
