name: CI Pipeline

on:
  push:
    branches: [ "main", "master", "feature/**", "fix/**" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Job 1: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - run: npm test -- --testPathIgnorePatterns="selenium-wd-tests"
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: jest-coverage, path: coverage/, retention-days: 7 }

  # ── Job 2: Linting ───────────────────────────────────────────────────────
  lint:
    name: Code Style (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install --ignore-scripts
      - run: npm run lint

  # ── Job 3: Code Quality ──────────────────────────────────────────────────
  security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ajinabraham/njsscan-action@master
        with: { args: 'src/ --sarif --output results.sarif || true' }
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: results.sarif }
        continue-on-error: true
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install --ignore-scripts
      - run: npm audit --audit-level=high || true
      - run: npx jscpd src/ --min-lines 5 --min-tokens 50 --reporters console || true

  # ── Job 4: Selenium IDE ──────────────────────────────────────────────────
  e2e-selenium:
    name: E2E Tests (Selenium IDE)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: |
          npm install
          npm rebuild better-sqlite3
      - run: npm install -g selenium-side-runner
      - uses: nanasess/setup-chromedriver@v2
      - name: Start app
        run: nohup node src/app.js & sleep 3
        env: { PORT: 3000, SESSION_SECRET: ci-secret }
      - run: selenium-side-runner --base-url http://localhost:3000 --browser chrome --output-directory selenium-results selenium-tests/blog-app.side
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: selenium-results, path: selenium-results/ }

  # ── Job 5: Robot Framework ───────────────────────────────────────────────
  e2e-robot:
    name: Keyword-Driven Tests (Robot Framework)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r robot-tests/requirements.txt
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: |
          npm install
          npm rebuild better-sqlite3
      - uses: browser-actions/setup-chrome@v1
      - uses: nanasess/setup-chromedriver@v2
      - name: Start blog app
        run: |
          nohup node src/app.js &
          sleep 3
          curl -f http://localhost:3000 || exit 1
        env: { PORT: 3000, SESSION_SECRET: ci-robot-secret, NODE_ENV: test }
      - name: Run Robot Framework tests
        run: |
          robot \
            --outputdir robot-results \
            --variable BASE_URL:http://localhost:3000 \
            --variable BROWSER:headlesschrome \
            --loglevel INFO \
            robot-tests/tests/
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: robot-results, path: robot-results/, retention-days: 7 }

  # ── Job 6: Selenium WebDriver (Page Object) ──────────────────────────────
  e2e-webdriver:
    name: E2E Tests (Selenium WebDriver + Page Object)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - name: Install app dependencies
        run: |
          npm install
          npm rebuild better-sqlite3
      - name: Install Selenium test dependencies
        run: |
          cd selenium-wd-tests
          npm install
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2
      - name: Start blog application
        run: |
          nohup node src/app.js &
          sleep 3
          curl -f http://localhost:3000 || exit 1
        env: { PORT: 3000, SESSION_SECRET: ci-webdriver-secret, NODE_ENV: test }
      - name: Run Selenium WebDriver tests
        run: |
          cd selenium-wd-tests
          npm test
        env: { BASE_URL: http://localhost:3000, CI: true }
        continue-on-error: true
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with: { name: selenium-wd-screenshots, path: selenium-wd-tests/screenshots/, retention-days: 7 }

  # ── Job 7: BDD Tests (Cucumber.js) ───────────────────────────────────────
  e2e-bdd-cucumber:
    name: Behavior Driven Tests (Cucumber.js)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - name: Install app dependencies
        run: |
          npm install
          npm rebuild better-sqlite3
      - name: Install Cucumber dependencies
        run: |
          cd bdd-tests
          npm install
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2
      - name: Start blog application
        run: |
          nohup node src/app.js &
          sleep 3
          curl -f http://localhost:3000 || exit 1
        env: { PORT: 3000, SESSION_SECRET: ci-bdd-secret, NODE_ENV: test }
      - name: Run Cucumber BDD Tests
        run: |
          cd bdd-tests
          npm test
        env: { BASE_URL: http://localhost:3000, CI: true }
        continue-on-error: true
      - name: Upload Cucumber JSON Report
        uses: actions/upload-artifact@v4
        if: always()
        with: { name: cucumber-report, path: bdd-tests/cucumber-report.json, retention-days: 7 }

  # ── Job 8: API Tests (Newman / Postman) ──────────────────────────────────
  api-tests:
    name: API Tests (Postman / Newman)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - name: Install app dependencies
        run: |
          npm install
          npm rebuild better-sqlite3
      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra
      - name: Start blog application
        run: |
          nohup node src/app.js &
          sleep 3
          curl -f http://localhost:3000 || exit 1
        env: { PORT: 3000, SESSION_SECRET: ci-api-test-secret, NODE_ENV: test }
      - name: Run Postman collection via Newman
        run: |
          mkdir -p api-tests/reports
          newman run api-tests/blog-app-postman-collection.json \
            --environment api-tests/blog-app-local-environment.json \
            --env-var "base_url=http://localhost:3000" \
            --reporters cli,json,htmlextra \
            --reporter-json-export api-tests/reports/newman-report.json \
            --reporter-htmlextra-export api-tests/reports/newman-report.html \
            --reporter-htmlextra-title "Blog App API Test Report" \
            --delay-request 300 \
            --timeout-request 10000
        continue-on-error: true
      - name: Upload API test reports
        uses: actions/upload-artifact@v4
        if: always()
        with: { name: api-test-reports, path: api-tests/reports/, retention-days: 7 }

  # ── Job 9: Load Tests (k6) ───────────────────────────────────────────────
  load-tests:
    name: Load Tests (k6)
    runs-on: ubuntu-latest
    needs: [ unit-tests ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install app dependencies
        run: npm install --ignore-scripts

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Start blog application
        run: |
          nohup node src/app.js &
          sleep 3
          curl -f http://localhost:3000 || exit 1
        env:
          PORT: 3000
          SESSION_SECRET: ci-k6-secret
          NODE_ENV: test

      - name: Run smoke test first
        run: |
          k6 run load-tests/blog-smoke-test.js \
            --env BASE_URL=http://localhost:3000
        continue-on-error: true

      - name: Run k6 load tests
        run: |
          mkdir -p load-tests/results
          k6 run load-tests/blog-load-test.js \
            --env BASE_URL=http://localhost:3000 \
            --env TEST_EMAIL=k6_load_test@example.com \
            --env TEST_PASS=K6LoadPass123! \
            --env TEST_USER=k6_load_user \
            --out json=load-tests/results/k6-report.json \
            --summary-export=load-tests/results/k6-summary.json
        continue-on-error: true

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-load-test-results
          path: load-tests/results/
          retention-days: 7
