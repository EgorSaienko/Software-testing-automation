name: CI Pipeline

on:
  push:
    branches: [ "main", "master", "feature/**", "fix/**" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage
          path: coverage/
          retention-days: 7

  lint:
    name: Code Style (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install --ignore-scripts
      - run: npm run lint

  security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ajinabraham/njsscan-action@master
        with:
          args: 'src/ --sarif --output results.sarif || true'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --ignore-scripts
      - run: npm audit --audit-level=high || true
      - run: npx jscpd src/ --min-lines 5 --min-tokens 50 --reporters console || true

  e2e-selenium:
    name: E2E Tests (Selenium IDE)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: |
          npm install
          npm rebuild better-sqlite3
      - run: npm install -g selenium-side-runner
      - uses: nanasess/setup-chromedriver@v2
      - name: Start app
        run: nohup node src/app.js & sleep 3
        env:
          PORT: 3000
          SESSION_SECRET: ci-secret
      - run: selenium-side-runner --base-url http://localhost:3000 --browser chrome --output-directory selenium-results selenium-tests/blog-app.side
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-results
          path: selenium-results/

  e2e-robot:
    name: Keyword-Driven Tests (Robot Framework)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r robot-tests/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          npm install
          npm rebuild better-sqlite3
      - uses: browser-actions/setup-chrome@v1
      - uses: nanasess/setup-chromedriver@v2
      - name: Start blog app
        run: |
          nohup node src/app.js &
          sleep 3
          curl -f http://localhost:3000 || exit 1
        env:
          PORT: 3000
          SESSION_SECRET: ci-robot-secret
          NODE_ENV: test
      - name: Run Robot Framework tests
        run: |
          robot \
            --outputdir robot-results \
            --variable BASE_URL:http://localhost:3000 \
            --variable BROWSER:headlesschrome \
            --loglevel INFO \
            robot-tests/tests/
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: robot-results/
          retention-days: 7