name: CI Pipeline

on:
  push:
    branches: [ "main", "master", "feature/**", "fix/**" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ── Job 1: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run unit tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Job 2: Linting (ESLint) ──────────────────────────────────────────────
  lint:
    name: Code Style (ESLint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  # ── Job 3: Code Quality (njsscan) ────────────────────────────────────────
  security:
    name: Code Quality & Security (njsscan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run njsscan (static analysis)
        uses: ajinabraham/njsscan-action@master
        with:
          args: 'src/ --sarif --output results.sarif || true'

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
        continue-on-error: true

      - name: Setup Node.js for audit
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run npm audit (dependency vulnerabilities)
        run: npm audit --audit-level=high || true

      - name: Run duplicate code check (jscpd)
        run: npx jscpd src/ --min-lines 5 --min-tokens 50 --reporters console || true
